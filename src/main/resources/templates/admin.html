<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="/js/admin.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white" id="currentUserInfo"></span>
    <form th:action="@{/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-link text-secondary text-decoration-none">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-2 bg-white min-vh-100 p-0">
            <div class="list-group rounded-0 mt-3">
                <a href="#" id="adminMenuLink" class="list-group-item list-group-item-action active">Admin</a>
                <a href="#" id="userMenuLink" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <div class="col-10 p-4">

            <div id="adminPage">
                <h1 class="mb-4 fw-bold display-5">Admin panel</h1>

                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <button type="button" class="nav-link active" id="usersTab">Users table</button>
                    </li>
                    <li class="nav-item">
                        <button type="button" class="nav-link" id="newUserTab">New User</button>
                    </li>
                </ul>

                <div id="usersSection" class="mt-4">
                    <div class="card">
                        <div class="card-header fs-5">All users</div>
                        <div class="card-body">
                            <table class="table table-striped align-middle mb-0">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First name</th>
                                    <th>Last name</th>
                                    <th>Age</th>
                                    <th>Username</th>
                                    <th>Roles</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="newUserSection" class="mt-4 d-none">
                    <div class="card">
                        <div class="card-header fs-5">Add new user</div>
                        <div class="card-body">
                            <form id="createUserForm" class="mx-auto" style="max-width: 420px;">
                                <div class="mb-3 text-center">
                                    <label for="newFirstName" class="form-label fw-bold">First name</label>
                                    <input type="text" class="form-control" id="newFirstName" required>
                                </div>

                                <div class="mb-3 text-center">
                                    <label for="newLastName" class="form-label fw-bold">Last name</label>
                                    <input type="text" class="form-control" id="newLastName" required>
                                </div>

                                <div class="mb-3 text-center">
                                    <label for="newAge" class="form-label fw-bold">Age</label>
                                    <input type="number" class="form-control" id="newAge" required>
                                </div>

                                <div class="mb-3 text-center">
                                    <label for="newUsername" class="form-label fw-bold">Username</label>
                                    <input type="text" class="form-control" id="newUsername" required>
                                </div>

                                <div class="mb-3 text-center">
                                    <label for="newPassword" class="form-label fw-bold">Password</label>
                                    <input type="password" class="form-control" id="newPassword" required>
                                </div>

                                <div class="mb-3 text-center">
                                    <label for="newRoles" class="form-label fw-bold">Role</label>
                                    <select multiple class="form-select" id="newRoles" size="2" required>
                                        <option value="ROLE_ADMIN">ADMIN</option>
                                        <option value="ROLE_USER">USER</option>
                                    </select>
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-success">Add new user</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div id="userPage" class="d-none">
                <h1 class="mb-4 fw-bold display-5">User information-page</h1>

                <div class="card">
                    <div class="card-header fs-4">About user</div>
                    <div class="card-body">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Username</th>
                                <th>Roles</th>
                            </tr>
                            </thead>
                            <tbody id="userTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
