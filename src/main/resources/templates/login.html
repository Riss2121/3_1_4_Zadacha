<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <form th:action="@{/login}" method="post" class="bg-white p-4 border rounded shadow-sm">
                <h2 class="text-center fw-bold mb-4">Please sign in</h2>

                <div th:if="${param.error}" class="alert alert-danger py-2">
                    Invalid username or password
                </div>

                <div th:if="${param.logout}" class="alert alert-success py-2">
                    You have been logged out
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Username</label>
                    <input type="text"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Password"
                           required>
                </div>

                <button class="btn btn-primary w-100" type="submit">Sign in</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
